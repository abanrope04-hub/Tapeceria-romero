<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapicería Romero | Maestros Artesanos</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --header: #1e4d3a;
            --text: #333;
        }

        /* --- MODO NOCHE --- */
        .dark-mode {
            --bg: #121212;
            --header: #0d261c;
            --text: #f4f4f4;
        }

        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: 'Segoe UI', sans-serif; margin: 0; transition: 0.3s; 
        }

        /* --- CABECERA --- */
        header { 
            background: var(--header); color: white; text-align: center; 
            padding: 40px 20px 60px; /* Más padding abajo para que no tape los botones */
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; 
            position: relative;
        }

        .logo-circle {
            background: white; width: 70px; height: 70px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 30px;
        }

        .btn-noche {
            position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.2);
            border: none; color: white; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 10px;
        }

        /* --- BOTONES DE CONTACTO --- */
        .contact-grid {
            display: flex; justify-content: center; gap: 12px; 
            margin-top: -30px; /* Posición perfecta */
            padding: 0 10px;
        }

        .btn-box {
            background: white; width: 95px; height: 85px; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; font-size: 11px; font-weight: bold; color: #555;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .blue { border-bottom: 4px solid #3498db; }
        .green { border-bottom: 4px solid #2ecc71; }
        .red { border-bottom: 4px solid #e74c3c; }

        /* --- SOBRE NOSOTROS --- */
        .info-section { text-align: center; padding: 40px 20px; }
        .main-text { font-size: 18px; font-style: italic; max-width: 500px; margin: 0 auto; line-height: 1.5; }

        /* --- GALERÍA --- */
        .gallery {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px; padding: 20px;
        }
        .img-card { 
            background: white; border-radius: 12px; overflow: hidden; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; color: #333;
        }
        .img-card img { width: 100%; height: 130px; object-fit: cover; display: block; }
        .img-card p { font-size: 10px; padding: 8px; margin: 0; font-weight: bold; }

    </style>
</head>
<body>

<header>
    <button class="btn-noche" onclick="toggleMode()">🌓 MODO NOCHE</button>
    <div class="logo-circle">🛋️</div>
    <h1 style="margin:0;">Tapicería Romero</h1>
    <p style="margin:5px 0; opacity:0.8;">MAESTROS ARTESANOS</p>
</header>

<nav class="contact-grid">
    <a href="tel:+573107085531" class="btn-box blue"><span>📞</span><br>LLAMAR</a>
    <a href="https://wa.me/573107085531?text=Hola,%20quisiera%20cotizar%20un%20servicio" class="btn-box green"><span>💬</span><br>CHARLAR</a>
    <a href="https://maps.app.goo.gl/vQonKBytKndNscJm9" target="_blank" class="btn-box red"><span>📍</span><br>MAPA</a>
</nav>

<section class="info-section">
    <p style="color:#888; letter-spacing:2px; font-size:10px; margin-bottom: 10px;">SOBRE NOSOTROS</p>
    <p class="main-text">"Más de 40 años renovando la comodidad de los hogares cartageneros con estilo y detalle."</p>
</section>

<div class="gallery">
    <div class="img-card"><img src="sofa1.png"><p>SOFÁS</p></div>
    <div class="img-card"><img src="sillagamer1.jpg"><p>GAMER</p></div>
    <div class="img-card"><img src="silladeoficina2.png"><p>OFICINA</p></div>
    <div class="img-card"><img src="mecedoras1.jpg"><p>MECEDORAS</p></div>
    <div class="img-card"><img src="antesydespues1.jpg"><p>RESTAURACIONES</p></div>
</div>

<script>
    function toggleMode() {
        document.body.classList.toggle('dark-mode');
    }
</script>

</body>
</html>
